# Project configuration. No secrets in here (Open-Meteo needs no key, SQLite is
# keyless). Anything sensitive goes in config/settings.local.yaml or env vars,
# both of which are git-ignored.

region:
  name: West Yorkshire
  # bbox used to filter the national feeds down to WY
  bbox:
    min_lat: 53.55
    max_lat: 53.98
    min_lon: -2.20
    max_lon: -1.20

# 7 consecutive days (Mon-Sun) of the study window.
window:
  dates:
    - 2024-06-03
    - 2024-06-04
    - 2024-06-05
    - 2024-06-06
    - 2024-06-07
    - 2024-06-08
    - 2024-06-09
  gtfsrt_sample_seconds: 60

# Compliance / on-time rules (the brief's metric definitions).
reliability:
  ontime_lower_min: -2      # primary urban band, +/- 2 min
  ontime_upper_min: 2
  sensitivity_bands_min: [3, 5]
  compliance_threshold: 0.85
  stop_match_radius_m: 50
  time_bands:
    am_peak: [7, 9]
    inter_peak: [9, 16]
    pm_peak: [16, 19]
    evening: [19, 23]

# Time-aware train/test split (by position in the date list above).
split:
  train_days: 5
  test_days: 2

paths:
  raw: data/raw
  parquet: data/parquet
  sample: data/sample
  db: data/reliability.sqlite

sources:
  ndl_archive_base: https://data.bus-data.dft.gov.uk/  # placeholder; set the real archive base
  open_meteo_archive: https://archive-api.open-meteo.com/v1/archive
  rate_limit_per_sec: 1
  # URL templates filled with {date}=YYYY-MM-DD by download_archive.py.
  # Set these to the real archive paths you have access to before running ingest.
  # timetable_url_template: "https://.../timetables/{date}/wy.zip"
  # gtfsrt_url_template:    "https://.../gtfsrt/{date}/snapshots.dat"
  # Local paths for the supplementary datasets (download once, by hand):
  # imd_csv:       data/raw/imd2019.csv
  # lsoa_geojson:  data/raw/lsoa_2011.geojson

spark:
  app_name: bods-reliability-wy
  master: "local[*]"
  shuffle_partitions: 8
