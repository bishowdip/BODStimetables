# Project configuration. No secrets in here (Open-Meteo needs no key, SQLite is
# keyless). Anything sensitive goes in config/settings.local.yaml or env vars,
# both of which are git-ignored.

region:
  name: West Yorkshire
  # bbox used to filter the national feeds down to WY
  bbox:
    min_lat: 53.55
    max_lat: 53.98
    min_lon: -2.20
    max_lon: -1.20

# 7 consecutive days of the study window (live-captured Jul 2026, Thu-Wed).
window:
  dates:
    - 2026-07-02
    - 2026-07-03
    - 2026-07-04
    - 2026-07-05
    - 2026-07-06
    - 2026-07-07
    - 2026-07-08
  gtfsrt_sample_seconds: 60

# Compliance / on-time rules (the brief's metric definitions).
reliability:
  ontime_lower_min: -2      # primary urban band, +/- 2 min
  ontime_upper_min: 2
  sensitivity_bands_min: [3, 5]
  compliance_threshold: 0.85
  stop_match_radius_m: 50
  # stop events with |delay| above this are GPS/matching artefacts, not service
  # behaviour (about 1% of matches in the study window) -- dropped and counted
  max_abs_delay_min: 60
  time_bands:
    am_peak: [7, 9]
    inter_peak: [9, 16]
    pm_peak: [16, 19]
    evening: [19, 23]

# Time-aware train/test split (by position in the date list above).
split:
  train_days: 5
  test_days: 2

paths:
  raw: data/raw
  parquet: data/parquet
  sample: data/sample
  db: data/reliability.sqlite

sources:
  open_meteo_archive: https://archive-api.open-meteo.com/v1/archive
  # Live BODS feeds. The API key is read from the env var named here (set it in
  # the git-ignored .env); positions and disruptions are live-only, so they are
  # captured across the study window rather than downloaded after the fact.
  bods:
    api_key_env: BODS_API_KEY
    gtfsrt_url: https://data.bus-data.dft.gov.uk/api/v1/gtfsrtdatafeed/
    timetable_url: https://data.bus-data.dft.gov.uk/timetable/download/gtfs-file/yorkshire

  # --- Supplementary datasets (download_supplementary.py fetches these). ---
  imd_url: https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/845345/File_7_-_All_IoD2019_Scores__Ranks__Deciles_and_Population_Denominators_3.csv
  lsoa_url: https://raw.githubusercontent.com/gausie/LSOA-2011-GeoJSON/master/lsoa.geojson
  # local paths the loader reads (set by download_supplementary.py):
  imd_csv:      data/raw/imd2019.csv          # IoD2019 File 7 (LSOA scores/deciles)
  lsoa_geojson: data/raw/lsoa_wy.geojson      # LSOA 2011 boundaries, WY subset

spark:
  app_name: bods-reliability-wy
  master: "local[*]"
  shuffle_partitions: 8
